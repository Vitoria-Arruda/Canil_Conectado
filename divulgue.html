<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanilConectado</title>
    <style>
        body {
            background-color: #ffff;
            min-height: 100vh;
            color: white;
            font-family: Arial, sans-serif;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        header {
            background-color: #FBE4CD;
            width: 100%;
            height: 150px;
            margin-bottom: 0;
            border-bottom: 2px solid #fff;
            position: relative;
        }
        .header-buttons {
    position: absolute;
    top: 25px;
    right: 80px;
}

.header-buttons a {
    color: #7d4b22;
    text-decoration: none;
    margin: 0 10px;
    padding: 8px 16px;
    border: 1px solid #7d4b22;
    border-radius: 5px;
}

        .logo img {
            width: auto;
            height: 150px;
        }

        .frasep {
            padding: 3px 8px;
            position: absolute;
            bottom: 0;
            left: 35%;
            font-size: 22px;
        }

        .frasep p7 {
            color: #7d4b22;
            text-decoration: none;
        }

        .frase1 p4 {
            color: #7d4b22;
            margin-left: 8%;
        }

        .frase2 p5 {
            color: #7d4b22;
            margin-left: 20%;
        }

        .frase1, .frase2 {
            margin-bottom: 5%;
        }

        form[id="cadastro"] {
            width: 100%;
            height: 60vh;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .input-container {
            display: flex;
            width: 100%;
        }

        .input-group {
            margin-left: 20%;
        }

        .endereco {
            margin-left: 5%;
            margin-right: 20%;
        }

        input[type="text"],
        input[type="date"],
        input[type="email"],
        input[type="tel"],
        input[type="password"] {
            width: 80%;
            margin-bottom: 10px;
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
            text-align: center;
            font-weight: bold;
        }

        input[type="submit"] {
            background-color: #F5D3B3;
            color: #181818;
            padding: 10px;
            border: 3px solid #D1E8E2;
            border-radius: 8px;
            cursor: pointer;
            width: 30%;
            font-weight: bold;
            margin-top: 10px;
        }

        footer {
            background-color: #FBE4CD;
            color: #7d4b22;
            padding: 10px;
            text-align: center;
            margin-top: auto;
        }

        footer nav {
            text-align: center;
        }

        footer nav ul {
            list-style-type: none;
            padding: 0;
            display: flex;
            justify-content: center;
        }

        footer nav ul a {
            color: #7d4b22;
            text-decoration: none;
            padding: 5px 10px;
            font-size: 14px;
        }

        .social-icons {
            margin-top: 10px;
        }

        .social-icons a {
            color: #7d4b22;
            text-decoration: none;
            margin: 0 10px;
            padding: 8px 16px;
            font-size: 14px;
        }

        .social-icons img {
            color: #7d4b22;
            width: 2%;
        }

        p6 {
            display: block;
            margin-top: 10px;
            font-size: 12px;
            color: #7d4b22;
        }

        @media (max-width: 768px) {
            .header-buttons {
                top: 15px;
                right: 10px;
            }

            .header-buttons a {
                margin: 0 5px;
                padding: 6px 12px;
                font-size: 14px;
            }

            .pesq1 {
                bottom: 5px;
                right: 10px;
                padding: 2px 6px;
                font-size: 14px;
            }

            .imgprincipal {
                max-height: 300px;
            }

            footer nav ul a, .social-icons a {
                font-size: 12px;
            }

            p6 {
                font-size: 10px;
            }
        }
    </style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="logo.png" alt="Logo do Site">
        </div>
        <div class="frasep">
            <p7>Divulgue e ajude um animal a encontrar um lar</p7>
        </div>
        <div class="header-buttons">
            <a href="index.html">Página Inicial</a>
        </div>
    </header>

    <form id="cadastro">
        <div class="input-container">
            <div class="input-group">
                <div class="frase1"><p4>Insira os dados do animal que quer divulgar</p4></div>
                <input type="text" id="nome" name="nome" placeholder="Nome" required maxlength="20">
                <input type="text" id="genero" name="genero" placeholder="Gênero">
                <input type="text" id="porte" name="porte" placeholder="Porte" required maxlength="10">
                <input type="text" id="idade" name="idade" placeholder="Idade">
                <input type="text" id="especie" name="especie" placeholder="Espécie" required maxlength="10">
                <input type="text" id="raca" name="raca" placeholder="Raça" required maxlength="50">
                <input type="text" id="info" name="info" placeholder="Informações" required maxlength="100">
                <div>
                    <p3>Inserir imagem</p3>
                    <input type="file" id="imagem-filme" name="image">
                </div>
            </div>
            <div class="endereco">
                <div class="frase2"><p5>Onde o animal está?</p5></div>
                <input type="text" id="cidade" name="cidade" placeholder="Cidade" required maxlength="50">
                <input type="text" id="estado" name="estado" placeholder="Estado" required maxlength="50">
                <input type="text" id="endereco" name="endereco" placeholder="Endereço" required maxlength="50">
                <input type="text" id="bairro" name="bairro" placeholder="Bairro" required maxlength="50">
                <input type="text" id="numero" name="numero" placeholder="Número">
            </div>
        </div>
        <input type="submit" value="Cadastrar">
    </form>

    <footer>
        <nav>
            <ul>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="politica_privacidade.html">Política de Privacidade</a></li>
            </ul>
        </nav>
        <div class="social-icons">
            <a href="https://facebook.com" target="_blank"><img src="icons8-facebook-50.png"></a>
            <a href="https://twitter.com" target="_blank"><img src="icons8-x-50.png"></a>
            <a href="https://instagram.com" target="_blank"><img src="icons8-instagram-50.png"></a>
        </div>
        <p6>&copy; 2024 Canil Conectado. Todos os direitos reservados.</p6>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('cadastro');

    form.addEventListener('submit', async (event) => {
        event.preventDefault(); // Impede o envio padrão do formulário

        // Coleta os dados do formulário
        const formData = new FormData(form);
        const data = Object.fromEntries(formData.entries());
        
        // Ajusta o formato dos dados para o esperado pela API
        const payload = {
            name: data.nome,
            gender: data.genero,
            size: data.porte,
            age: data.idade,
            species: data.especie,
            breed: data.raca,
            information: data.info,
            city: data.cidade,
            state: data.estado,
            address: data.endereco,
            neighborhood: data.bairro,
            number: data.numero
        };

        try {
            const response = await fetch('http://localhost:3000/animals', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(payload),
            });

            if (!response.ok) {
                throw new Error('Erro ao cadastrar o animal');
            }

            const result = await response.json();
            alert('Animal cadastrado com sucesso!');

            // Redireciona para a página do animal cadastrado
            window.location.href = `/animal/${result.id}`; // Ajuste o caminho conforme necessário
        } catch (error) {
            console.error('Erro:', error);
            alert('Erro ao cadastrar o animal.');
        }
    });
});

    </script>
</body>
</html>
