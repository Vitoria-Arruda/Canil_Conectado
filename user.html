<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CanilConectado</title>
<style>
    body {
        background-color: #ffff;
        min-height: 100vh;
        color: #7d4b22;
        font-family: Arial, sans-serif;
        margin: 0;
        display: flex;
        flex-direction: column;
    }

    header {
        background-color: #FBE4CD;
        width: 100%;
        height: 150px;
        margin-bottom: 1%;
        border-bottom: 2px solid #fff;
        position: relative;
    }

    .logo img {
        width: auto;
        height: 150px;
    }

    .header-buttons {
        position: absolute;
        top: 25px;
        right: 80px;
    }

    .header-buttons a {
        color: #7d4b22;
        text-decoration: none;
        margin: 0 10px;
        padding: 8px 16px;
        border: 1px solid #7d4b22;
        border-radius: 5px;
    }

    .button-container {
        display: flex;
        justify-content: center;
        margin-top: 20px;
    }

    .button-container button {
        background-color: #7d4b22;
        color: #fff;
        border: none;
        padding: 10px 20px;
        margin: 0 10px;
        border-radius: 5px;
        cursor: pointer;
        font-size: 16px;
    }

    .button-container button:hover {
        background-color: #6a3a1b;
    }

    .content {
        display: none;
        text-align: center;
        margin: 20px;
    }

    .content h2 {
        margin-bottom: 20px;
    }

    .content p {
        margin: 10px 0;
    }

    footer {
        background-color: #FBE4CD;
        color: #7d4b22;
        padding: 10px;
        text-align: center;
        margin-top: auto;
    }

    footer nav {
        text-align: center;
    }

    footer nav ul {
        list-style-type: none;
        padding: 0;
        display: flex;
        justify-content: center;
    }

    footer nav ul a {
        color: #7d4b22;
        text-decoration: none;
        padding: 5px 10px;
        font-size: 14px;
    }

    .social-icons {
        margin-top: 10px;
    }

    .social-icons a {
        color: #7d4b22;
        text-decoration: none;
        margin: 0 10px;
        padding: 8px 16px;
        font-size: 14px;
    }

    .social-icons img {
        color: #7d4b22;
        width: 2%;
    }

    p6 {
        display: block;
        margin-top: 10px;
        font-size: 12px;
        color: #7d4b22;
    }

@media (max-width: 768px) {
    .search-filters {
        flex-direction: column;
        align-items: center; /* Alinha os filtros ao centro quando empilhados verticalmente */
    }

    .search-filters select {
        width: 100%; /* Ajusta a largura para ocupar a largura total no layout vertical */
    }
}
.animal-list {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    margin-top: 20px;
  }

  .animal-item {
        border: 1px solid #ddd;
        border-radius: 5px;
        margin: 10px;
        padding: 10px;
        text-align: center;
        max-width: 200px;
        background-color: #f9f9f9;
    }

    .animal-item img {
        width: 100%;
        height: auto;
        border-radius: 5px;
    }

    .animal-item h3 {
        margin: 10px 0 5px;
        font-size: 16px;
        color: #7d4b22;
    }

    .animal-item p {
        margin: 5px 0;
        font-size: 14px;
        color: #7d4b22;
    }

    .animal-item button {
        background-color: #7d4b22;
        color: #fff;
        border: none;
        padding: 8px 16px;
        border-radius: 5px;
        cursor: pointer;
    }

    .animal-item button:hover {
        background-color: #6a3d1b;
    }

    .interesses {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 20px;
    }
</style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="logo.png" alt="Logo do Site">
        </div>

        <div class="header-buttons">
            <a href="index.html">Página Inicial</a>
        </div>
    </header>

    <div class="button-container">
        <button id="show-info">Meus dados</button>
        <button id="show-interests">Interesses para adoção</button>
    </div>

    <div class="content" id="user-info">
        <h2>Dados</h2>
        <p id="nome">Nome: </p>
        <p id="CPF">CPF: </p>
        <p id="CNPJ">CNPJ: </p>
        <p id="emailCadastrado">Email: </p>
        <p id="telefone">Telefone: </p>
        <p id="RD">Rede Social: </p>
    </div>

    <div class="content" id="user-interests">
        <h2>Interesses</h2>
        <div id="interests-list">
            <!-- Lista de interesses será inserida aqui dinamicamente -->
        </div>
    </div>
    <footer>
        <nav>
            <ul>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="politica_privacidade.html">Política de Privacidade</a></li>
            </ul>
        </nav>
        <div class="social-icons">
            <a href="https://facebook.com" target="_blank"><img src="icons8-facebook-50.png" alt="Facebook"></a>
            <a href="https://twitter.com" target="_blank"><img src="icons8-x-50.png" alt="Twitter"></a>
            <a href="https://instagram.com" target="_blank"><img src="icons8-instagram-50.png" alt="Instagram"></a>
        </div>
        <p6>&copy; 2024 Canil Conectado. Todos os direitos reservados.</p6>
    </footer>

    <script>
        document.getElementById('show-info').addEventListener('click', () => {
            fetch('/api/user-info')  // Substitua pelo endpoint da sua API para obter informações do usuário
                .then(response => response.json())
                .then(data => {
                    document.getElementById('user-info').style.display = 'block';
                    document.getElementById('user-interests').style.display = 'none';

                    document.getElementById('nome').textContent = `nome: ${data.nome}`;
                    document.getElementById('CPF').textContent = `CPF: ${data.cpf}`;
                    document.getElementById('CNPJ').textContent = `CNPJ: ${data.cnpj}`;
                    document.getElementById('emailCadastrado').textContent = `emailCadastrado: ${data.emailCadastrado}`;
                    document.getElementById('telefone').textContent = `telefone: ${data.telefone}`;
                    document.getElementById('redesocial').textContent = `redesocial: ${data.redesocial}`;
                })
                .catch(error => console.error('Erro ao buscar informações do usuário:', error));
        });

        document.getElementById('show-interests').addEventListener('click', () => {
            fetch('/api/user-interests')  // Substitua pelo endpoint da sua API para obter interesses do usuário
                .then(response => response.json())
                .then(data => {
                    document.getElementById('user-info').style.display = 'none';
                    document.getElementById('user-interests').style.display = 'block';

                    const interestsList = document.getElementById('interests-list');
                    interestsList.innerHTML = '';  // Limpar a lista existente

                    data.interests.forEach(animal => {
                        const animalItem = document.createElement('div');
                        animalItem.className = 'animal-item';

                        animalItem.innerHTML = `
                            <img src="${animal.image}" alt="${animal.name}">
                            <h3>${animal.name}</h3>
                            <p>Espécie: ${animal.species}</p>
                            <p>Raça: ${animal.breed}</p>
                            <!-- Adicione mais informações conforme necessário -->
                        `;

                        interestsList.appendChild(animalItem);
                    });
                })
                .catch(error => console.error('Erro ao buscar interesses do usuário:', error));
        });
    </script>
</body>
</html>
