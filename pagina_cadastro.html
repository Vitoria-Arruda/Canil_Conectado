<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanilConectado</title>
    <style>
        body {
            background: url(fundo.png);
            min-height: 95vh;
            font-family: Arial, sans-serif;
        }

        label {
            display: block;
        }

        form[id="cadastro"] {
            background-color: #ffff;
            width: 30%;
            height: 95vh;
            border-radius: 6px;
            border: solid #fff;
            margin: 0 auto; /* Centraliza o formulário horizontalmente */
            padding: 20px; /* Adiciona algum padding */
            display: flex;
            flex-direction: column;
            align-items: center; /* Centraliza o conteúdo horizontalmente */
            justify-content: center; /* Centraliza o conteúdo verticalmente */
        }

        .logo-container {
            margin-bottom: 20px; /* Espaço inferior opcional */
        }

        .logo-container img {
            max-width: 100%; /* Garante que a imagem não ultrapasse a largura do contêiner */
            height: auto; /* Mantém a proporção da imagem */
        }

        input[type="text"],
        input[type="date"],
        input[type="email"],
        input[type="tel"],
        input[type="password"] {
            width: 80%;
            margin-bottom: 10px; /* Ajusta o espaçamento inferior */
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            margin-left: 10%;
        }

        button {
            padding: 10px 20px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
            text-align: center;
            font-weight: bold;}

        input[type="submit"] {
            background-color: #F5D3B3;
            color: #181818;
            padding: 10px;
            border: 3px solid #D1E8E2;
            border-radius: 8px;
            cursor: pointer;
            width: 30%;
            font-weight: bold;
            margin-top: 5%;
        }

        @media(max-width: 768px){
            form[id="cadastro"] {
            background-color: #ffff;
            width: 60%;
            height: 95vh;
            border-radius: 6px;
            border: solid #fff;
            margin: 0 auto; /* Centraliza o formulário horizontalmente */
            padding: 20px; /* Adiciona algum padding */
            display: flex;
            flex-direction: column;
            align-items: center; /* Centraliza o conteúdo horizontalmente */
            justify-content: center; /* Centraliza o conteúdo verticalmente */
        }
        input[type="text"],
        input[type="date"],
        input[type="email"],
        input[type="tel"],
        input[type="password"] {
            width: 80%;
            margin-bottom: 10px; /* Ajusta o espaçamento inferior */
            padding: 8px;
            border: 1px solid #ccc;
            border-radius: 4px;
            box-sizing: border-box;
            margin-left: 10%;
            font-size: 10px;
        }
        button {
            padding: 5px 10px;
            border: none;
            border-radius: 4px;
            cursor: pointer;
            margin: 5px;
            text-align: center;
            font-weight: bold;
        }

        input[type="submit"] {
            background-color: #F5D3B3;
            color: #181818;
            padding: 8px;
            border: 3px solid #D1E8E2;
            border-radius: 8px;
            cursor: pointer;
            width: 50%;
            height: 5%;
            font-weight: bold;
            margin-top: 5%;
            font-size: 10px;
        }
        p{
            font-size: 12px;
        }
        }
    </style>
</head>
<body>
    <form id="cadastro">
        <div class="logo-container">
            <img src="logo.png" alt="logo">
        </div>
        <div class="input-group">
            <input type="text" id="nome" name="nome" placeholder="Nome" required maxlength="50">
            <input type="text" id="CPF" name="CPF" placeholder="CPF" required maxlength="14">
            <input type="text" id="CNPJ" name="CNPJ" placeholder="CNPJ" required maxlength="18">
            <input type="email" id="emailCadastro" name="emailCadastro" placeholder="E-mail" required maxlength="50">
            <input type="tel" id="telefone" name="telefone" placeholder="Telefone" required maxlength="15">
            <input type="text" id="RD" name="redesocial" placeholder="Rede social" required maxlength="50">
            <input type="password" id="senhaCadastro" name="senhaCadastro" placeholder="Senha " required maxlength="50">
            <input type="password" id="confirmarSenha" name="confirmarSenha" placeholder="Confirmar Senha" required maxlength="50">
        </div>
        <input type="submit" value="Cadastrar">
            <p>Já tem uma conta? <a href="pagina_login.html">Entrar</a></p>
    </form>

    <script>
        document.getElementById("cadastro").addEventListener("submit", function(event) {
            event.preventDefault(); 

            var nome = document.getElementById("nome").value;
            var CPF = document.getElementById('CPF').value;
            var CNPJ = document.getElementById('CNPJ').value;
            var emailCadastro = document.getElementById('emailCadastro').value;
            var telefone = document.getElementById('telefone').value;
            var redesocial = document.getElementById('redesocial').value;
            var senhaCadastro = document.getElementById("senhaCadastro").value;
            var confirmarSenha = document.getElementById("confirmarSenha").value;
            
            // Verifica se a senha e a confirmação de senha correspondem
            if (senhaCadastro !== confirmarSenha) {
                alert("As senhas não correspondem. Por favor, tente novamente.");
                return;
            }

            localStorage.setItem("nome", nome);
            localStorage.setItem("CPF", CPF);
            localStorage.setItem("CNPJ", CNPJ);
            localStorage.setItem("email", emailCadastro);
            localStorage.setItem("telefone", telefone);
            localStorage.setItem("redesocial", redesocial);
            localStorage.setItem("senha", senhaCadastro);

            // Após o cadastro bem-sucedido, redirecionar para a página de login
            alert("Cadastro realizado com sucesso!");
            window.location.href = "pagina_login.html";
        });

        document.getElementById('CPF').addEventListener('input', function(e) {
            let cpf = e.target.value.replace(/\D/g, ''); // Remove todos os caracteres não numéricos

            // Adiciona os pontos e traço conforme o usuário digita
            cpf = cpf.replace(/(\d{3})(\d)/, '$1.$2');
            cpf = cpf.replace(/(\d{3})(\d)/, '$1.$2');
            cpf = cpf.replace(/(\d{3})(\d{1,2})$/, '$1-$2');

            // Atualiza o valor no campo
            e.target.value = cpf;
        });

        document.getElementById('CNPJ').addEventListener('input', function(e) {
            let CNPJ = e.target.value.replace(/\D/g, ''); // Remove todos os caracteres não numéricos

            // Adiciona os pontos e traço conforme o usuário digita
            CNPJ = CNPJ.replace(/(\d{2})(\d)/, '$1.$2');
            CNPJ = CNPJ.replace(/(\d{3})(\d)/, '$1.$2');
            CNPJ = CNPJ.replace(/(\d{3})(\d)/, '$1/$2');
            CNPJ = CNPJ.replace(/(\d{4})(\d{1,2})$/, '$1-$2');


            // Atualiza o valor no campo
            e.target.value = CNPJ;
        });

        document.getElementById('telefone').addEventListener('input', function(e) {
            let telefone = e.target.value.replace(/\D/g, ''); // Remove todos os caracteres não numéricos

            // Verifica o comprimento do número de telefone para aplicar a formatação adequada
            if (telefone.length <= 10) {
                // Formatação para telefone fixo (xx) xxxx-xxxx
                telefone = telefone.replace(/(\d{2})(\d)/, '($1) $2');
                telefone = telefone.replace(/(\d{4})(\d)/, '$1-$2');
            } else {
                // Formatação para celular (xx) xxxxx-xxxx
                telefone = telefone.replace(/(\d{2})(\d)/, '($1) $2');
                telefone = telefone.replace(/(\d{5})(\d)/, '$1-$2');
            }

            // Atualiza o valor no campo
            e.target.value = telefone;
        });

        console.log({
    nome,
    CPF,
    CNPJ,
    emailCadastro,
    telefone,
    redesocial,
    senhaCadastro,
    confirmarSenha
});
    </script>
</body>
</html>
