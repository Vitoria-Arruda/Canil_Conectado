<!DOCTYPE html>
<html lang="pt-br">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CanilConectado</title>
<style>
    body {
        background-color: #ffff;
        min-height: 100vh;
        color: white;
        font-family: Arial, sans-serif;
        margin: 0;
        display: flex;
        flex-direction: column;
    }

    header {
        background-color: #FBE4CD;
        width: 100%;
        height: 150px;
        margin-bottom: 1%;
        border-bottom: 2px solid #fff;
        position: relative;
    }

    .logo img {
        width: auto;
        height: 150px;
    }

    .header-buttons {
        position: absolute;
        top: 25px;
        right: 80px;
    }

    .header-buttons a {
        color: #7d4b22;
        text-decoration: none;
        margin: 0 10px;
        padding: 8px 16px;
        border: 1px solid #7d4b22;
        border-radius: 5px;
    }

    .header-buttons .my-account {
        display: none;
    }

    .header-buttons .login {
        display: block;
    }

    .pesq1 {
        background-color: #fff;
        border-radius: 5px;
        padding: 3px 15px;
        position: absolute;
        bottom: 5px;
        right: 80px;
        width: 20%;
        border: solid #ffff;
    }

    .link1{
        padding: 3px 8px;
        position: absolute;
        bottom: 0;
        left: 50%;
        font-size: 22px;
    }

    .link1 a {
        color: #7d4b22;
        text-decoration: none; /* Remover sublinhado */
    }

    .link2{
        padding: 3px 8px;
        position: absolute;
        bottom: 0;
        left: 20%;
        font-size: 22px;
    }

    .link2 a{
        color: #7d4b22;
        text-decoration: none; /* Remover sublinhado */
    }

    .imgprincipal {
        width: 90%; /* Ajuste a largura conforme necessário */
        height: auto;
        max-height: 500px;
        object-fit: cover;
        margin: 0 auto; /* Centralizar a imagem */
        display: block;
    }

    footer {
        background-color: #FBE4CD;
        color: #7d4b22;
        padding: 10px;
        text-align: center;
        margin-top: auto;
    }

    footer nav {
        text-align: center;
    }

    footer nav ul {
        list-style-type: none;
        padding: 0;
        display: flex;
        justify-content: center;
    }

    footer nav ul a {
        color: #7d4b22;
        text-decoration: none;
        padding: 5px 10px;
        font-size: 14px;
    }

    .social-icons {
        margin-top: 10px;
    }

    .social-icons a {
        color: #7d4b22;
        text-decoration: none;
        margin: 0 10px;
        padding: 8px 16px;
        font-size: 14px;
    }

    .social-icons img{
        color:#7d4b22;
        width: 2%;
    }

    p6 {
        display: block;
        margin-top: 10px;
        font-size: 12px;
        color: #7d4b22;
    }


    @media (max-width: 768px) {
        .header-buttons {
            top: 15px;
            right: 10px;
        }

        .header-buttons a {
            margin: 0 5px;
            padding: 6px 12px;
            font-size: 14px;
        }

        .link1{
        padding: 1px 5px;
        bottom: 0;
        left: 50%;
        font-size: 12px;
    }

    .link1 a {
        color: #7d4b22;
        text-decoration: none; /* Remover sublinhado */
    }

    .link2{
        padding: 1px 5px;
        bottom: 0;
        left: 27%;
        font-size: 12px;
    }

    .link2 a{
        color: #7d4b22;
        text-decoration: none; /* Remover sublinhado */
    }


        .pesq1 {
            bottom: 5px;
            right: 10px;
            padding: 2px 6px;
            font-size: 14px;
        }

        .imgprincipal {
            max-height: 300px;
        }

        footer nav ul a, .social-icons a {
            font-size: 12px;
        }

        p6 {
            font-size: 10px;
        }
    }
    .animal-list {
        display: flex;
        flex-wrap: wrap;
        justify-content: center;
        margin-top: 20px;
    }

    .animal-item {
        border: 1px solid #ddd;
        border-radius: 5px;
        margin: 10px;
        padding: 10px;
        text-align: center;
        max-width: 200px;
        background-color: #f9f9f9;
    }

    .animal-item img {
        width: 100%;
        height: auto;
        border-radius: 5px;
    }

    .animal-item h3 {
        margin: 10px 0 5px;
        font-size: 16px;
        color: #7d4b22;
    }

    .animal-item p {
        margin: 5px 0;
        font-size: 14px;
        color: #7d4b22;
    }

    @media (max-width: 768px) {
        .animal-item {
            max-width: 100%;
        }
    }
</style>
</head>
<body>
    <header>
        <div class="logo">
            <img src="logo.png" alt="Logo do Site">
        </div>
        <div class="header-buttons">
            <a href="pagina_login.html" class="login">Entrar</a>
            <a href="user.html" class="my-account">Minha Conta</a>
        </div>
        <div class="link1">
            <a href="adote.html">Quero adotar</a>
        </div>
        <div class="link2">
            <a href="divulgue.html"> Quero divulgar </a>
        </div>
        <input type="text" class="pesq1" placeholder="Pesquisar...">
    </header>

    <div>
        <img src="imgprincipal1.png" alt="principal" class="imgprincipal">
    </div>

    <div class="animal-list" id="animal-list">
        <!-- Animais serão inseridos aqui dinamicamente -->
    </div>

    <footer>
        <nav>
            <ul>
                <li><a href="sobre.html">Sobre</a></li>
                <li><a href="politica_privacidade.html">Política de Privacidade</a></li>
            </ul>
        </nav>
        <div class="social-icons">
            <a href="https://facebook.com" target="_blank"><img src="icons8-facebook-50.png"></a>
            <a href="https://twitter.com" target="_blank"><img src="icons8-x-50.png"></a>
            <a href="https://instagram.com" target="_blank"><img src="icons8-instagram-50.png"></a>
        </div>
        <p6>&copy; 2024 Canil Conectado. Todos os direitos reservados.</p6>
    </footer>

    <script>
        document.addEventListener('DOMContentLoaded', function() {
            const animalList = document.getElementById('animal-list');
            const loginButton = document.querySelector('.header-buttons .login');
            const myAccountButton = document.querySelector('.header-buttons .my-account');

            // Função para verificar o estado de login
            function checkLoginStatus() {
                // Aqui você deve verificar se o usuário está autenticado.
                // Exemplo usando localStorage:
                const isLoggedIn = localStorage.getItem('isLoggedIn');

                if (isLoggedIn === 'true') {
                    loginButton.style.display = 'none';
                    myAccountButton.style.display = 'block';
                } else {
                    loginButton.style.display = 'block';
                    myAccountButton.style.display = 'none';
                }
            }

            // Verifica o estado de login ao carregar a página
            checkLoginStatus();

            function fetchAnimals() {
                fetch('api/animais?limit=6') // Ajuste a URL e os parâmetros conforme necessário
                    .then(response => response.json())
                    .then(data => {
                        animalList.innerHTML = ''; // Limpa a lista antes de adicionar novos itens
                        data.animais.forEach(animal => {
                            const animalItem = document.createElement('div');
                            animalItem.className = 'animal-item';

                            animalItem.innerHTML = `
                                <img src="${animal.imagem}" alt="${animal.nome}">
                                <h3>${animal.nome}</h3>
                                <p>${animal.cidade}, ${animal.estado}</p>
                            `;
                            animalList.appendChild(animalItem);
                        });
                    })
                    .catch(error => console.error('Erro ao carregar animais:', error));
            }

            // Inicialmente, carregue os últimos 6 animais
            fetchAnimals();

            // Opcional: Atualize a lista de animais periodicamente, por exemplo, a cada 10 minutos
            setInterval(fetchAnimals, 10 * 60 * 1000); // Atualiza a cada 10 minutos
        });
    </script>
    </script>
</body>
</html>
