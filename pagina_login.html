<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CanilConectado</title>
    <style>
        body {
            background-color: #FFFFFF; /* Alterar o fundo para branco */
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            font-family: Arial, sans-serif;
        }

        #login {
            display: flex;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            box-sizing: border-box;
        }

        .image-section {
            flex: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }

        .image-section img {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .dados {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            padding: 20px;
            box-sizing: border-box;
            background-color: #FFF;
        }

        .dados img {
            margin-bottom: 20px;
            display: f;
        }

        h2 {
            margin-bottom: 20px;
        }

        input {
            width: 60%;
            padding: 15px;
            margin-top: 10px;
            margin-bottom: 10px;
            background-color: #FFF;
            border: 2px solid #ccc;
            border-radius: 8px;
            box-sizing: border-box;
        }

        button {
            background-color: #F5D3B3;
            color: #181818;
            padding: 15px;
            border: 3px solid #D1E8E2;
            border-radius: 8px;
            cursor: pointer;
            width: 30%;
            font-weight: bold;
            margin-top: 10px;
        }

        button:hover {
            background-color: #C4A484;
        }

        p {
            margin-top: 20px;
            color: #777;
        }

        p a {
            color: #555;
            text-decoration: none;
        }

        p a:hover {
            text-decoration: underline;
        }

        @media (max-width: 768px) {
            #login {
                flex-direction: column;
            }
            .image-section, .dados, .dados img {
                width: 100%;
                height: 50vh; /* Ajusta a altura para dispositivos menores */
            }
        }

       @media (max-width: 768px){

       }
    </style>
</head>
<body>
    <form id="login">
        <div class="image-section">
            <img src="imglogin.png" alt="Imagem de login">
        </div>
        <div class="dados">
            <img src="logo.png" alt="Logo">
            <h2>Insira seus dados para entrar</h2>
            <input type="email" id="email" name="email" placeholder="E-mail" required>
            <input type="password" id="senha" name="senha" placeholder="Senha" required>
            <button id="entrar" type="submit">Entrar</button>
            <p>
                <a href="#">Esqueceu a senha?</a>
            </p>
            <p>Ainda não tem conta? <a href="pagina_cadastro.html">Registrar.</a></p>
        </div>
    </form>

    <script>
        document.getElementById("login").addEventListener("submit", function(event) {
            event.preventDefault();

            var emailLogin = document.getElementById("email").value;
            var senhaLogin = document.getElementById("senha").value;

            // Verificar se as credenciais estão corretas no armazenamento local
            var storedEmail = localStorage.getItem("email");
            var storedSenha = localStorage.getItem("senha");

            if (emailLogin === storedEmail && senhaLogin === storedSenha) {
                alert("Bem-vindo!");
                window.location.href = "Cinediscovery.html"; // Redirecionar para a página da conta do usuário
            } else {
                alert("E-mail ou senha incorretos. Por favor, tente novamente.");
            }
        });

        document.getElementById("criarContaBtn").addEventListener("click", function(event) {
            event.preventDefault();

            // Redirecionar para a página de cadastro
            window.location.href = "pagina_cadastro.html";
        });
    </script>
</body>
</html>
